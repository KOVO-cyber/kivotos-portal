<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生徒一覧 | キヴォトスポータル</title>
  <style>
    :root {
      --cw: min(1400px, calc(100vw - 32px));
      --text:   #1e3a5f;
      --muted:  #5a7a9a;
      --border: #aecde8;
      --navy:   #0e2040;
      --blue:   #1a5fa8;
      --sky:    #3b9bd8;
      --card:   rgba(240,249,255,.97);
      --on-dark: rgba(210,235,255,.92);
    }
    * { box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN","Hiragino Sans","Segoe UI","Yu Gothic UI",sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      background: linear-gradient(155deg, #d6eaff 0%, #eaf5ff 45%, #d8edf7 100%);
      background-attachment: fixed;
    }

    /* ── ヘッダー ── */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,24,52,.93);
      border-bottom: 1px solid rgba(80,150,220,.3);
      backdrop-filter: blur(10px);
    }
    .header-inner {
      max-width: var(--cw); margin: 0 auto; padding: 0 16px;
      height: 52px; display: flex; align-items: center; gap: 20px;
    }
    .header-logo {
      text-decoration: none; display: flex; align-items: center;
      gap: 6px; flex-shrink: 0;
    }
    .logo-mark {
      width: 28px; height: 28px; border-radius: 6px;
      background: linear-gradient(135deg, #1a5fa8 0%, #3b9bd8 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 900; color: #fff;
      flex-shrink: 0;
    }
    .logo-text {
      font-size: 17px; font-weight: 900;
      color: #fff; letter-spacing: .05em;
    }
    .logo-text span { color: var(--sky); }
    .header-nav { display: flex; align-items: center; gap: 2px; flex: 1; }
    .header-nav a {
      padding: 5px 12px; border-radius: 6px;
      color: var(--on-dark); text-decoration: none;
      font-size: 13px; font-weight: 600; letter-spacing: .04em;
      transition: background .12s, color .12s;
    }
    .header-nav a:hover { background: rgba(255,255,255,.08); color: #fff; }
    .header-nav a.active {
      background: rgba(59,155,216,.2); color: var(--sky);
      border: 1px solid rgba(59,155,216,.35);
    }

    /* ── ページタイトル ── */
    .wrap { max-width: var(--cw); margin: 0 auto; padding: 20px 16px 48px; }
    .page-title-bar {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .page-breadcrumb {
      font-size: 12px; color: var(--muted); margin-bottom: 4px;
    }
    .page-breadcrumb a {
      color: var(--muted); text-decoration: none;
      transition: color .12s;
    }
    .page-breadcrumb a:hover { color: var(--blue); }
    .page-breadcrumb span { color: var(--text); }
    .page-title {
      margin: 0; font-size: 22px; font-weight: 900;
      color: var(--navy); letter-spacing: .05em;
    }

    /* ── フィルターバー ── */
    .filter-bar {
      border-radius: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px 16px 10px;
      margin-bottom: 14px;
      box-shadow: 0 4px 16px rgba(10,20,48,.18);
    }
    .filter-row {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .filter-label {
      font-size: 10px; font-weight: 800; color: var(--muted);
      letter-spacing: .12em; text-transform: uppercase; white-space: nowrap;
    }
    .filter-pill {
      padding: 4px 11px; border-radius: 999px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 600; color: var(--blue);
      cursor: pointer; transition: all .1s; user-select: none; line-height: 1.4;
    }
    .filter-pill:hover { background: #e8f4fd; border-color: var(--sky); }
    .filter-pill.active {
      background: var(--blue); color: #fff; border-color: var(--blue);
    }

    /* 詳細フィルタ トグル */
    .detail-toggle {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 6px;
      border: 1px solid var(--border); background: #fff;
      font-size: 12px; font-weight: 700; color: var(--blue);
      cursor: pointer; transition: all .1s; user-select: none;
      margin-top: 8px;
    }
    .detail-toggle:hover { background: #e8f4fd; }
    .detail-toggle .arrow {
      font-size: 10px; transition: transform .2s; display: inline-block;
    }
    .detail-toggle.open .arrow { transform: rotate(180deg); }

    .detail-filters {
      display: none; padding-top: 8px; margin-top: 8px;
      border-top: 1px solid var(--border);
    }
    .detail-filters.open { display: block; }
    .detail-row {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 8px; align-items: start;
      padding: 7px 0;
      border-top: 1px dashed var(--border);
    }
    .detail-row:first-child { border-top: none; }
    .detail-label {
      font-size: 11px; font-weight: 800; color: var(--blue);
      letter-spacing: .04em; padding-top: 5px; line-height: 1.3;
    }
    .detail-pills { display: flex; flex-wrap: wrap; gap: 5px; }
    .filter-reset-btn {
      margin-top: 10px;
      border: 1px solid var(--border); background: #fff;
      color: var(--blue); font-size: 12px; font-weight: 700;
      border-radius: 6px; padding: 5px 14px;
      cursor: pointer; transition: background .1s;
    }
    .filter-reset-btn:hover { background: #e8f4fd; border-color: var(--sky); }

    /* 学園アイコントグル */
    .icon-toggle-wrap {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 700; color: var(--blue);
    }
    .toggle-switch-label {
      display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    }
    .toggle-input { display: none; }
    .toggle-track {
      width: 34px; height: 18px; border-radius: 9px;
      background: #c8daea; position: relative; transition: background .2s;
      flex-shrink: 0;
    }
    .toggle-track::after {
      content: ""; position: absolute;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; top: 2px; left: 2px;
      transition: transform .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .toggle-input:checked + .toggle-track { background: var(--sky); }
    .toggle-input:checked + .toggle-track::after { transform: translateX(16px); }

    /* フィルターバー ヘッダー行 */
    .filter-bar-head {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .filter-bar-head-left {
      font-size: 11px; font-weight: 800; color: var(--muted);
      letter-spacing: .1em;
    }

    /* ── キャラグリッド ── */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }
    .char-card {
      border-radius: 10px; background: var(--card);
      border: 1px solid var(--border); overflow: hidden;
      text-decoration: none; color: inherit;
      transition: transform .12s, box-shadow .12s;
      display: flex; flex-direction: column;
    }
    .char-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(10,20,48,.2);
    }
    .char-img-wrap {
      aspect-ratio: 1/1; overflow: hidden;
      background: linear-gradient(180deg, #d8ecf8 0%, #eef6fb 100%);
      position: relative;
    }
    .char-img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: top; display: block;
    }
    .char-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #8bbad8;
    }

    /* 学園アイコンバッジ */
    .school-badge {
      position: absolute; top: 5px; right: 5px;
      width: 24px; height: 24px;
      background: rgba(255,255,255,.85);
      border-radius: 50%; padding: 2px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,.2);
    }
    .school-badge img { width: 18px; height: 18px; object-fit: contain; }


    .char-info {
      padding: 5px 6px;
      border-top: 3px solid var(--sky);
      text-align: center;
    }
    .char-info.abydos     { border-top-color: #EA580C; }
    .char-info.gehenna    { border-top-color: #B91C1C; }
    .char-info.trinity    { border-top-color: #64748B; }
    .char-info.millennium { border-top-color: #2563EB; }
    .char-info.shanhai    { border-top-color: #6D28D9; }
    .char-info.hyakki     { border-top-color: #DB2777; }
    .char-info.arius      { border-top-color: #881337; }
    .char-info.srt        { border-top-color: #0D9488; }
    .char-info.redwinter  { border-top-color: #DC2626; }
    .char-info.valkyrie   { border-top-color: #7C3AED; }
    .char-info.wildhunt   { border-top-color: #059669; }
    .char-info.highlander { border-top-color: #D97706; }
    .char-info.other      { border-top-color: #64748B; }

    .char-name {
      font-size: 11px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .no-results {
      text-align: center; padding: 48px; color: var(--muted);
      font-size: 14px; grid-column: 1/-1;
    }

    /* ── 検索バー ── */
    .search-wrap {
      position: relative; margin-bottom: 12px;
    }
    .search-icon {
      position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 16px; pointer-events: none;
      line-height: 1;
    }
    .search-input {
      width: 100%; padding: 10px 16px 10px 40px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: #fff; font-size: 14px; color: var(--text);
      outline: none; transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(59,155,216,.15);
    }

    /* ── フッター ── */
    footer.site-footer {
      padding: 16px 16px 20px; text-align: center;
      color: var(--muted); font-size: 11px;
      letter-spacing: .06em;
      border-top: 1px solid var(--border);
    }

    /* ── レスポンシブ ── */
    @media (max-width: 640px) {
      .header-nav { display: none; }
      .char-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; }
    }
  </style>
</head>

  <script>
    const SCHOOL_CLASS = {
      'アビドス':'abydos','ゲヘナ':'gehenna','トリニティ':'trinity',
      'ミレニアム':'millennium','山海経':'shanhai','百鬼夜行':'hyakki',
      'アリウス':'arius','SRT':'srt','レッドウィンター':'redwinter',
      'ヴァルキューレ':'valkyrie','ワイルドハント':'wildhunt',
      'ハイランダー':'highlander','その他':'other',
    };
    const SCHOOL_ICON = {
      'アビドス':'../assets/schools/アビドス.png',
      'ゲヘナ':'../assets/schools/ゲヘナ.png',
      'トリニティ':'../assets/schools/トリニティ.png',
      'ミレニアム':'../assets/schools/ミレニアム.png',
      '山海経':'../assets/schools/山海経.png',
      '百鬼夜行':'../assets/schools/百鬼夜行.png',
      'アリウス':'../assets/schools/アリウス.png',
      'SRT':'../assets/schools/SRT.png',
      'レッドウィンター':'../assets/schools/レッドウィンター.png',
      'ヴァルキューレ':'../assets/schools/ヴァルキューレ.png',
      'ワイルドハント':'../assets/schools/ワイルドハント.png',
      'ハイランダー':'../assets/schools/ハイランダー.png',
    };
    const VERSION_ORDER = ['通常','水着','正月','バニーガール','制服','ドレス','温泉',
      '体操服','アイドル','メイド','臨戦','パジャマ','バンド','チーパオ','私服',
      'マジカル','キャンプ','応援団','幼女','ライディング','ガイド','クリスマス','アルバイト'];

    // フィルター状態 (key → Set<string>、空 = 全表示)
    const FILTER_KEYS = ['school','version','role','position','unit','attack','defense','weapon'];
    const activeFilters = new Map(FILTER_KEYS.map(k => [k, new Set()]));

    let allChars = [];
    let showIcons = true;
    let searchQuery = '';

    // ── 五十音ソート ──
    function isKanaFirst(name) { return /^[ぁ-んァ-ヶー]/.test(name); }
    function sortKana(arr) {
      return [...arr].sort((a, b) => {
        const ag = isKanaFirst(a.name) ? 0 : 1;
        const bg = isKanaFirst(b.name) ? 0 : 1;
        if (ag !== bg) return ag - bg;
        return a.name.localeCompare(b.name, 'ja');
      });
    }

    // ── バージョン抽出 ──
    function getVersion(name) {
      const m = name.match(/（([^）]+)）/);
      if (!m) return '通常';
      const v = m[1];
      return v.startsWith('スタイル') ? '臨戦' : v;
    }

    // ── バージョンフィルタ動的生成 ──
    function buildVersionFilter(chars) {
      const seen = new Set(chars.map(c => getVersion(c.name)));
      const ordered = [...VERSION_ORDER.filter(v => seen.has(v)),
                       ...[...seen].filter(v => !VERSION_ORDER.includes(v))];
      const row = document.getElementById('version-filter');
      row.innerHTML = '';
      ordered.forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'filter-pill';
        btn.dataset.key = 'version';
        btn.dataset.val = v;
        btn.textContent = v;
        row.appendChild(btn);
      });
    }

    // ── 共通ピルトグル（複数選択） ──
    function setupPillFilter(containerId, key) {
      document.getElementById(containerId).addEventListener('click', e => {
        const btn = e.target.closest('[data-key]');
        if (!btn || btn.dataset.key !== key) return;
        const val = btn.dataset.val;
        const set = activeFilters.get(key);
        if (set.has(val)) { set.delete(val); btn.classList.remove('active'); }
        else              { set.add(val);    btn.classList.add('active'); }
        renderGrid();
      });
    }
    setupPillFilter('school-filter',   'school');
    setupPillFilter('version-filter',  'version');
    setupPillFilter('role-filter',     'role');
    setupPillFilter('position-filter', 'position');
    setupPillFilter('unit-filter',     'unit');
    setupPillFilter('attack-filter',   'attack');
    setupPillFilter('defense-filter',  'defense');
    setupPillFilter('weapon-filter',   'weapon');

    // ── リセット ──
    document.getElementById('reset-btn').addEventListener('click', () => {
      activeFilters.forEach(s => s.clear());
      document.querySelectorAll('.filter-pill.active').forEach(b => b.classList.remove('active'));
      searchQuery = '';
      document.getElementById('search-input').value = '';
      renderGrid();
    });

    // ── 詳細フィルタ トグル ──
    const detailBtn   = document.getElementById('detail-toggle-btn');
    const detailPanel = document.getElementById('detail-filters');
    detailBtn.addEventListener('click', () => {
      const open = detailPanel.classList.toggle('open');
      detailBtn.classList.toggle('open', open);
    });

    // ── 学園アイコン トグル ──
    document.getElementById('icon-toggle').addEventListener('change', e => {
      showIcons = e.target.checked;
      renderGrid();
    });

    // ── 検索バー ──
    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderGrid();
    });

    // ── レンダリング ──
    function renderGrid() {
      const f = activeFilters;
      const q = searchQuery.toLowerCase();
      const filtered = allChars.filter(c =>
        (!f.get('school').size   || f.get('school').has(c.school))          &&
        (!f.get('version').size  || f.get('version').has(getVersion(c.name))) &&
        (!f.get('role').size     || f.get('role').has(c.role))              &&
        (!f.get('position').size || f.get('position').has(c.position))      &&
        (!f.get('unit').size     || f.get('unit').has(c.unitType))          &&
        (!f.get('attack').size   || f.get('attack').has(c.attackType))      &&
        (!f.get('defense').size  || f.get('defense').has(c.defenseType))    &&
        (!f.get('weapon').size   || f.get('weapon').has(c.weaponType))      &&
        (!q || c.name.toLowerCase().includes(q))
      );

      const grid = document.getElementById('char-grid');
      if (!filtered.length) {
        grid.innerHTML = '<p class="no-results">該当するキャラクターが見つかりません。</p>';
        return;
      }
      grid.innerHTML = filtered.map(c => {
        const sc      = SCHOOL_CLASS[c.school] || '';
        const iconSrc = SCHOOL_ICON[c.school] || '';
        const badge   = (showIcons && iconSrc)
          ? `<div class="school-badge"><img src="${iconSrc}" alt="${c.school}" loading="lazy"></div>`
          : '';
        const img = c.image
          ? `<img class="char-img" src="../assets/icons/${c.image}" alt="${c.name}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            + `<div class="char-img-placeholder" style="display:none">★</div>`
          : `<div class="char-img-placeholder">★</div>`;
        return `<a class="char-card" href="${c.page||'#'}">
          <div class="char-img-wrap">${img}${badge}</div>
          <div class="char-info ${sc}"><div class="char-name">${c.name}</div></div>
        </a>`;
      }).join('');

      // 長い名前は自動縮小
      requestAnimationFrame(() => {
        document.querySelectorAll('.char-name').forEach(el => {
          el.style.fontSize = '';
          let size = parseFloat(getComputedStyle(el).fontSize);
          while (el.scrollWidth > el.offsetWidth + 1 && size > 7) {
            size -= 0.5;
            el.style.fontSize = size + 'px';
          }
        });
      });
    }

    // ── データ読み込み ──
    async function loadChars() {
      try {
        const res = await fetch('../assets/data/characters.json');
        allChars = sortKana(await res.json());
        buildVersionFilter(allChars);
        renderGrid();
      } catch {
        document.getElementById('char-grid').innerHTML =
          '<p class="no-results">characters.json が読み込めません。</p>';
      }
    }

    loadChars();
  </script>
</body>
</html>
