<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生徒アーカイブ | ブルアカファンサイト キヴォトスポータル</title>
  <style>
    :root {
      --content-width: min(1400px, calc(100vw - 32px));
      --bg: #eef6fb;
      --card: #ffffff;
      --text: #2f3f54;
      --muted: #718099;
      --border: #d9e4ef;
      --accent: #1f3b62;
      --orange: #F39801;
    }
    * { box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Segoe UI", "Yu Gothic UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("../assets/bg.jpg");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      background-attachment: fixed;
      filter: blur(5px) brightness(.85);
      transform: scale(1.04);
      transform-origin: center;
      pointer-events: none;
    }

    /* ── ヘッダー（index.htmlと共通） ── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(20, 38, 64, .92);
      border-bottom: 1px solid rgba(154, 188, 225, .35);
      backdrop-filter: blur(8px);
    }
    .header-inner {
      max-width: var(--content-width);
      margin: 0 auto;
      padding: 0 16px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .header-logo { text-decoration: none; display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
    .header-logo-jp { font-size: 11px; font-weight: 700; color: rgba(207, 225, 245, .75); letter-spacing: .1em; }
    .header-logo-en { font-size: 18px; font-weight: 900; color: var(--orange); letter-spacing: .04em; }
    .header-nav { display: flex; align-items: center; gap: 4px; flex: 1; }
    .header-nav a { padding: 5px 12px; border-radius: 6px; color: rgba(207, 225, 245, .85); text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: .04em; transition: background .12s, color .12s; }
    .header-nav a:hover { background: rgba(255, 255, 255, .1); color: #fff; }
    .header-nav a.active { background: rgba(243, 152, 1, .18); color: var(--orange); }

    /* ── コンテンツ ── */
    .wrap { max-width: var(--content-width); margin: 0 auto; padding: 20px 16px 40px; }

    .page-title-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(154, 188, 225, .3);
    }
    .page-title {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
      color: var(--orange);
      letter-spacing: .04em;
    }
    .page-breadcrumb { font-size: 12px; color: rgba(207,225,245,.65); }
    .page-breadcrumb a { color: rgba(154,188,225,.85); text-decoration: none; }
    .page-breadcrumb a:hover { color: #cfe1f5; }

    /* 追加学園バッジ色 */
    .char-info.redwinter   { border-top-color: #DC2626; }
    .char-info.valkyrie    { border-top-color: #7C3AED; }
    .char-info.wildhunt    { border-top-color: #059669; }
    .char-info.highlander  { border-top-color: #D97706; }
    .char-info.other       { border-top-color: #64748B; }

    /* フィルターバー */
    .filter-bar {
      border-radius: 12px;
      background: rgba(235, 245, 255, .95);
      border: 1px solid #c8daea;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(10,20,36,.12);
    }
    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: .1em; white-space: nowrap; }
    .filter-pill {
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid #c8daea;
      background: #fff;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      cursor: pointer;
      transition: background .1s, border-color .1s, color .1s;
      user-select: none;
    }
    .filter-pill:hover { background: #eef4fb; }
    .filter-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .filter-divider { width: 1px; height: 20px; background: #d9e4ef; margin: 0 4px; }

    /* キャラグリッド */
    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 12px;
    }
    .char-card {
      border-radius: 10px;
      background: #fff;
      border: 1px solid var(--border);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform .12s, box-shadow .12s;
      display: flex;
      flex-direction: column;
    }
    .char-card:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(10,20,36,.18); }
    .char-img-wrap {
      aspect-ratio: 3/4;
      overflow: hidden;
      background: #eef4fb;
      position: relative;
    }
    .char-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }
    .char-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: #9abbe0;
    }
    .char-role-badge {
      position: absolute;
      top: 6px;
      right: 6px;
      font-size: 9px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: .04em;
    }
    .role-tank    { background: rgba(37,99,235,.85);  color: #fff; }
    .role-attacker{ background: rgba(185,28,28,.85);  color: #fff; }
    .role-healer  { background: rgba(13,148,136,.85); color: #fff; }
    .role-support { background: rgba(109,40,217,.85); color: #fff; }
    .role-special { background: rgba(219,39,119,.85); color: #fff; }

    .char-info {
      padding: 7px 9px;
      border-top: 3px solid #2563EB;
    }
    .char-info.abydos    { border-top-color: #EA580C; }
    .char-info.gehenna   { border-top-color: #B91C1C; }
    .char-info.trinity   { border-top-color: #64748B; }
    .char-info.millennium{ border-top-color: #2563EB; }
    .char-info.shanhai   { border-top-color: #6D28D9; }
    .char-info.hyakki    { border-top-color: #DB2777; }
    .char-info.arius     { border-top-color: #881337; }
    .char-info.srt       { border-top-color: #0D9488; }

    .char-name { font-size: 13px; font-weight: 800; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .char-school { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; grid-column: 1/-1; }

    footer.site-footer {
      padding: 14px 16px 18px;
      text-align: center;
      color: rgba(207, 225, 245, .7);
      font-size: 11px;
      letter-spacing: .06em;
      text-shadow: 0 1px 3px rgba(0, 0, 0, .45);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="header-logo" href="../index.html">
        <span class="header-logo-jp">ブルアカファンサイト</span>
        <span class="header-logo-en">KIVOTOS PORTAL</span>
      </a>
      <nav class="header-nav">
        <a href="../index.html">ホーム</a>
        <a href="index.html" class="active">生徒アーカイブ</a>
        <a href="../timeline/index.html">イベント年表</a>
      </nav>
    </div>
  </header>

  <div class="wrap">
    <div class="page-title-bar">
      <div>
        <div class="page-breadcrumb"><a href="../index.html">ホーム</a> › 生徒アーカイブ</div>
        <h1 class="page-title">生徒アーカイブ</h1>
      </div>
    </div>

    <!-- フィルターバー -->
    <div class="filter-bar">
      <div class="filter-row" id="school-filter">
        <span class="filter-label">学園</span>
        <button class="filter-pill active" data-school="all">すべて</button>
        <button class="filter-pill" data-school="アビドス">アビドス</button>
        <button class="filter-pill" data-school="ゲヘナ">ゲヘナ</button>
        <button class="filter-pill" data-school="トリニティ">トリニティ</button>
        <button class="filter-pill" data-school="ミレニアム">ミレニアム</button>
        <button class="filter-pill" data-school="山海経">山海経</button>
        <button class="filter-pill" data-school="百鬼夜行">百鬼夜行</button>
        <button class="filter-pill" data-school="アリウス">アリウス</button>
        <button class="filter-pill" data-school="SRT">SRT</button>
        <button class="filter-pill" data-school="レッドウィンター">レッドウィンター</button>
        <button class="filter-pill" data-school="ヴァルキューレ">ヴァルキューレ</button>
        <button class="filter-pill" data-school="ワイルドハント">ワイルドハント</button>
        <button class="filter-pill" data-school="ハイランダー">ハイランダー</button>
        <button class="filter-pill" data-school="その他">その他</button>
        <div class="filter-divider"></div>
        <span class="filter-label">ロール</span>
        <button class="filter-pill active" data-role="all">すべて</button>
        <button class="filter-pill" data-role="タンク">タンク</button>
        <button class="filter-pill" data-role="アタッカー">アタッカー</button>
        <button class="filter-pill" data-role="ヒーラー">ヒーラー</button>
        <button class="filter-pill" data-role="サポート">サポート</button>
        <button class="filter-pill" data-role="スペシャル">スペシャル</button>
      </div>
    </div>

    <!-- キャラグリッド（data/characters.jsonから動的生成） -->
    <div class="char-grid" id="char-grid">
      <!-- JS で data/characters.json を読み込んで生成 -->
      <div class="no-results">data/characters.json を読み込んでいます...</div>
    </div>
  </div>

  <footer class="site-footer">
    ブルアカファンサイト KIVOTOS PORTAL — 『ブルーアーカイブ』非公式ファンサイト
  </footer>

  <script>
    // ── キャラデータ読み込み ──
    const SCHOOL_CLASS = {
      'アビドス': 'abydos', 'ゲヘナ': 'gehenna', 'トリニティ': 'trinity',
      'ミレニアム': 'millennium', '山海経': 'shanhai', '百鬼夜行': 'hyakki',
      'アリウス': 'arius', 'SRT': 'srt',
      'レッドウィンター': 'redwinter', 'ヴァルキューレ': 'valkyrie',
      'ワイルドハント': 'wildhunt', 'ハイランダー': 'highlander', 'その他': 'other',
    };
    const ROLE_CLASS = {
      'タンク': 'role-tank', 'アタッカー': 'role-attacker', 'ヒーラー': 'role-healer',
      'サポート': 'role-support', 'スペシャル': 'role-special',
    };

    let allChars = [];
    let activeSchool = 'all';
    let activeRole   = 'all';

    async function loadChars() {
      try {
        const res  = await fetch('../assets/data/characters.json');
        allChars   = await res.json();
        renderGrid();
      } catch {
        document.getElementById('char-grid').innerHTML =
          '<p class="no-results">characters.json が見つかりません。assets/data/ に配置してください。</p>';
      }
    }

    function renderGrid() {
      const filtered = allChars.filter(c => {
        const schoolOk = activeSchool === 'all' || c.school === activeSchool;
        const roleOk   = activeRole   === 'all' || c.role   === activeRole;
        return schoolOk && roleOk;
      });

      const grid = document.getElementById('char-grid');
      if (!filtered.length) {
        grid.innerHTML = '<p class="no-results">該当するキャラクターが見つかりません。</p>';
        return;
      }

      grid.innerHTML = filtered.map(c => {
        const sc = SCHOOL_CLASS[c.school] || '';
        const rc = ROLE_CLASS[c.role]     || '';
        const img = c.image
          ? `<img class="char-img" src="../assets/icons/${c.image}" alt="${c.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          + `<div class="char-img-placeholder" style="display:none">★</div>`
          : `<div class="char-img-placeholder">★</div>`;
        return `
          <a class="char-card" href="${c.page || '#'}">
            <div class="char-img-wrap">
              ${img}
              <span class="char-role-badge ${rc}">${c.role}</span>
            </div>
            <div class="char-info ${sc}">
              <div class="char-name">${c.name}</div>
              <div class="char-school">${c.school}</div>
            </div>
          </a>`;
      }).join('');
    }

    // フィルターボタン
    document.getElementById('school-filter').addEventListener('click', e => {
      const btn = e.target.closest('[data-school],[data-role]');
      if (!btn) return;
      if (btn.dataset.school !== undefined) {
        document.querySelectorAll('[data-school]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSchool = btn.dataset.school;
      }
      if (btn.dataset.role !== undefined) {
        document.querySelectorAll('[data-role]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeRole = btn.dataset.role;
      }
      renderGrid();
    });

    loadChars();
  </script>
</body>
</html>
