<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>イベント年表 | ブルアカファンサイト キヴォトスポータル</title>
  <style>
    :root {
      --content-width: min(900px, calc(100vw - 32px));
      --text: #2f3f54;
      --muted: #718099;
      --border: #d9e4ef;
      --accent: #1f3b62;
      --orange: #F39801;
    }
    * { box-sizing: border-box; }
    html { scrollbar-gutter: stable; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Segoe UI", "Yu Gothic UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url("../assets/bg.jpg");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: cover;
      background-attachment: fixed;
      filter: blur(5px) brightness(.85);
      transform: scale(1.04);
      transform-origin: center;
      pointer-events: none;
    }

    /* ── ヘッダー ── */
    .site-header { position: sticky; top: 0; z-index: 100; background: rgba(20,38,64,.92); border-bottom: 1px solid rgba(154,188,225,.35); backdrop-filter: blur(8px); }
    .header-inner { max-width: min(1200px, calc(100vw - 32px)); margin: 0 auto; padding: 0 16px; height: 52px; display: flex; align-items: center; gap: 20px; }
    .header-logo { text-decoration: none; display: flex; align-items: baseline; gap: 8px; flex-shrink: 0; }
    .header-logo-jp { font-size: 11px; font-weight: 700; color: rgba(207,225,245,.75); letter-spacing: .1em; }
    .header-logo-en { font-size: 18px; font-weight: 900; color: var(--orange); letter-spacing: .04em; }
    .header-nav { display: flex; align-items: center; gap: 4px; }
    .header-nav a { padding: 5px 12px; border-radius: 6px; color: rgba(207,225,245,.85); text-decoration: none; font-size: 13px; font-weight: 600; letter-spacing: .04em; transition: background .12s, color .12s; }
    .header-nav a:hover { background: rgba(255,255,255,.1); color: #fff; }
    .header-nav a.active { background: rgba(243,152,1,.18); color: var(--orange); }

    /* ── コンテンツ ── */
    .wrap { max-width: var(--content-width); margin: 0 auto; padding: 20px 16px 40px; }

    .page-title-bar { margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid rgba(154,188,225,.3); }
    .page-breadcrumb { font-size: 12px; color: rgba(207,225,245,.65); margin-bottom: 4px; }
    .page-breadcrumb a { color: rgba(154,188,225,.85); text-decoration: none; }
    .page-breadcrumb a:hover { color: #cfe1f5; }
    .page-title { margin: 0; font-size: 22px; font-weight: 800; color: var(--orange); letter-spacing: .04em; }

    /* ── タイムライン ── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: "";
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(154,188,225,.35);
    }

    .tl-year {
      position: relative;
      margin: 0 0 4px;
      padding: 4px 0 4px 20px;
      font-size: 14px;
      font-weight: 800;
      color: rgba(207,225,245,.75);
      letter-spacing: .1em;
    }
    .tl-year::before {
      content: "";
      position: absolute;
      left: -24px;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--orange);
      border: 2px solid rgba(20,38,64,.8);
    }

    .tl-event {
      position: relative;
      margin-bottom: 10px;
      border-radius: 10px;
      background: rgba(235,245,255,.95);
      border: 1px solid #c8daea;
      box-shadow: 0 2px 8px rgba(10,20,36,.12);
      overflow: hidden;
    }
    .tl-event::before {
      content: "";
      position: absolute;
      left: -20px;
      top: 16px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #9abbe0;
      border: 2px solid rgba(20,38,64,.6);
    }
    .tl-event-head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(154,188,225,.25);
    }
    .tl-tag {
      font-size: 10px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 4px;
      letter-spacing: .04em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tl-tag-main    { background: rgba(37,99,235,.15);  color: #2563EB;  border: 1px solid rgba(37,99,235,.35);  }
    .tl-tag-collab  { background: rgba(109,40,217,.15); color: #7C3AED;  border: 1px solid rgba(109,40,217,.35); }
    .tl-tag-total   { background: rgba(185,28,28,.15);  color: #DC2626;  border: 1px solid rgba(185,28,28,.35);  }
    .tl-tag-main-story { background: rgba(243,152,1,.15); color: #D97706; border: 1px solid rgba(243,152,1,.35); }

    .tl-event-name { font-size: 14px; font-weight: 700; color: var(--accent); flex: 1; }
    .tl-date { font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }

    .tl-event-body { padding: 10px 14px; display: flex; align-items: flex-start; gap: 12px; }
    .tl-desc { font-size: 12px; color: var(--muted); line-height: 1.55; flex: 1; }
    .tl-links { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
    .tl-link {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: .04em;
      white-space: nowrap;
    }
    .tl-link-pv     { background: rgba(220,38,38,.08); color: #dc2626; border: 1px solid rgba(220,38,38,.3); }
    .tl-link-goods  { background: rgba(243,152,1,.1);  color: #d97706; border: 1px solid rgba(243,152,1,.3); }
    .tl-link:hover { opacity: .8; }

    footer.site-footer { padding: 14px 16px 18px; text-align: center; color: rgba(207,225,245,.7); font-size: 11px; letter-spacing: .06em; text-shadow: 0 1px 3px rgba(0,0,0,.45); }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="header-logo" href="../index.html">
        <span class="header-logo-jp">ブルアカファンサイト</span>
        <span class="header-logo-en">KIVOTOS PORTAL</span>
      </a>
      <nav class="header-nav">
        <a href="../index.html">ホーム</a>
        <a href="../archive/index.html">生徒アーカイブ</a>
        <a href="index.html" class="active">イベント年表</a>
      </nav>
    </div>
  </header>

  <div class="wrap">
    <div class="page-title-bar">
      <div class="page-breadcrumb"><a href="../index.html">ホーム</a> › イベント年表</div>
      <h1 class="page-title">イベント年表</h1>
    </div>

    <!-- 年表（data/timeline.json から動的生成） -->
    <div class="timeline" id="timeline">
      <p style="color:rgba(207,225,245,.7);font-size:13px;">読み込み中...</p>
    </div>
  </div>

  <footer class="site-footer">
    ブルアカファンサイト KIVOTOS PORTAL — 『ブルーアーカイブ』非公式ファンサイト
  </footer>

  <script>
    // timeline.json の形式例:
    // [
    //   { "year": "2021", "events": [
    //     { "name": "エデン条約編 第1章", "type": "main-story", "date": "2021/02",
    //       "desc": "...", "pvUrl": "...", "goodsUrl": "..." }
    //   ]}
    // ]

    const TYPE_CLASS = {
      'main':       'tl-tag-main',
      'collab':     'tl-tag-collab',
      'total':      'tl-tag-total',
      'main-story': 'tl-tag-main-story',
    };
    const TYPE_LABEL = {
      'main':       'イベント',
      'collab':     'コラボ',
      'total':      '総力戦',
      'main-story': 'メインストーリー',
    };

    async function loadTimeline() {
      const tl = document.getElementById('timeline');
      try {
        const res  = await fetch('../assets/data/timeline.json');
        const data = await res.json();
        tl.innerHTML = data.map(yr => `
          <div class="tl-year">${yr.year}年</div>
          ${yr.events.map(ev => {
            const tc = TYPE_CLASS[ev.type]  || 'tl-tag-main';
            const tl = TYPE_LABEL[ev.type]  || ev.type;
            const links = [
              ev.pvUrl    ? `<a class="tl-link tl-link-pv"    href="${ev.pvUrl}"    target="_blank" rel="noopener">PV</a>` : '',
              ev.goodsUrl ? `<a class="tl-link tl-link-goods" href="${ev.goodsUrl}" target="_blank" rel="noopener sponsored">グッズ</a>` : '',
            ].filter(Boolean).join('');
            return `
              <div class="tl-event">
                <div class="tl-event-head">
                  <span class="tl-tag ${tc}">${tl}</span>
                  <span class="tl-event-name">${ev.name}</span>
                  <span class="tl-date">${ev.date}</span>
                </div>
                ${ev.desc || links ? `
                <div class="tl-event-body">
                  <p class="tl-desc">${ev.desc || ''}</p>
                  ${links ? `<div class="tl-links">${links}</div>` : ''}
                </div>` : ''}
              </div>`;
          }).join('')}
        `).join('');
      } catch {
        tl.innerHTML = '<p style="color:rgba(207,225,245,.7);font-size:13px;">assets/data/timeline.json が見つかりません。</p>';
      }
    }

    loadTimeline();
  </script>
</body>
</html>
